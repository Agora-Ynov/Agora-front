<header class="navbar">
  <div class="container-fluid d-flex justify-content-between align-items-center px-4">
    <!-- Logo -->
    <div class="navbar-brand d-flex align-items-center gap-2">
      <a routerLink="/" class="d-flex align-items-center gap-2 text-decoration-none">
        <div class="logo">
          <span class="material-icons">domain</span>
        </div>
        <span class="brand-text">
          <strong>Agora</strong>
          <br />
          <small>Réservations</small>
        </span>
      </a>
    </div>

    <!-- Menu Navigation -->
    <nav class="nav-links d-none d-md-flex gap-4 align-items-center">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
      >
        <span class="material-icons">home</span> Accueil
      </a>
      <a routerLink="/catalogue" routerLinkActive="active" class="nav-link">
        <span class="material-icons">shopping_bag</span> Catalogue
      </a>
      <a routerLink="/calendar" routerLinkActive="active" class="nav-link">
        <span class="material-icons">calendar_month</span> Calendrier
      </a>
    </nav>

    <!-- Auth Buttons -->
    <div class="auth-buttons d-none d-md-flex gap-2 align-items-center">
      <a routerLink="/auth" class="btn btn-login"> Connexion </a>
      <a routerLink="/register" class="btn btn-register"> Inscription </a>
    </div>

    <!-- Mobile Menu Button -->
    <button class="menu-toggle d-md-none" (click)="toggleMenu()">
      <span class="material-icons">{{ isMenuOpen ? 'close' : 'menu' }}</span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <nav class="mobile-menu d-md-none" *ngIf="isMenuOpen">
    <a routerLink="/" (click)="closeMenu()" class="mobile-nav-link">Accueil</a>
    <a routerLink="/catalogue" (click)="closeMenu()" class="mobile-nav-link">Catalogue</a>
    <a routerLink="/calendar" (click)="closeMenu()" class="mobile-nav-link">Calendrier</a>
    <hr />
    <a routerLink="/login" (click)="closeMenu()" class="mobile-nav-link">Connexion</a>
    <a routerLink="/register" (click)="closeMenu()" class="mobile-nav-link">Inscription</a>
  </nav>
</header>
