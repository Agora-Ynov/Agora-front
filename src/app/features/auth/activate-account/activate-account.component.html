<section class="activate-page">
  <div class="activate-card">
    <h1>Activer votre compte</h1>

    @if (checking()) {
      <p>Verification du lien...</p>
    } @else if (tokenValid() === false) {
      <p class="activate-error">{{ error() || 'Lien invalide.' }}</p>
      <a routerLink="/login" class="activate-link">Retour a la connexion</a>
    } @else {
      @if (emailHint(); as mail) {
        <p class="activate-hint">Compte associe a <strong>{{ mail }}</strong></p>
      }
      <label class="activate-field">
        <span>Nouveau mot de passe</span>
        <input
          type="password"
          autocomplete="new-password"
          [ngModel]="newPassword()"
          (ngModelChange)="newPassword.set($event)"
        />
      </label>
      <label class="activate-field">
        <span>Confirmation</span>
        <input
          type="password"
          autocomplete="new-password"
          [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)"
        />
      </label>
      @if (error(); as err) {
        <p class="activate-error">{{ err }}</p>
      }
      <button
        type="button"
        class="activate-submit"
        [disabled]="submitting()"
        (click)="submit()"
      >
        {{ submitting() ? 'Activation...' : 'Valider et se connecter' }}
      </button>
    }
  </div>
</section>
