name: Front CI — AGORA

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint ESLint + Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        continue-on-error: true
        run: npx prettier --check "src/**/*.ts" "src/**/*.html"

  # ─────────────────────────────────────────
  # JOB 2 : Tests unitaires Jest
  # ─────────────────────────────────────────
  unit-tests:
    name: Tests unitaires Jest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest with coverage
        run: npm run test:coverage -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: jest-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: front-coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: front-test-results
          path: test-results/
          retention-days: 7

      - name: Coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              console.log('Lines: ' + c.lines.pct + '%');
              console.log('Branches: ' + c.branches.pct + '%');
              console.log('Functions: ' + c.functions.pct + '%');
            " >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────
  # JOB 3 : Build production
  # ─────────────────────────────────────────
  build:
    name: Build Angular production
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build:prod
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: Check bundle size
        run: |
          echo "## Bundle sizes" >> $GITHUB_STEP_SUMMARY
          du -sh dist/agora-front/** >> $GITHUB_STEP_SUMMARY || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: front-build-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ─────────────────────────────────────────
  # JOB 4 : Tests E2E Cypress (uniquement sur main/develop)
  # Le back-end est consommé via son image Docker publiée
  # par le CI du repo agora-back
  # ─────────────────────────────────────────
  e2e:
    name: Tests E2E Cypress
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && hashFiles('cypress.config.*') != ''
    services:
      agora-back:
        image: ghcr.io/quentincavin/agora-back:latest
        ports:
          - 8080:8080
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agora_test
          SPRING_DATASOURCE_USERNAME: agora
          SPRING_DATASOURCE_PASSWORD: agora_test
          JWT_SECRET: ci-secret-min-256-bits-for-testing-only
          SMTP_HOST: mailhog
          SMTP_PORT: 1025
          FILE_UPLOAD_DIR: /tmp/agora-uploads

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agora_test
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Attendre que le back-end soit prêt
        run: |
          echo "Attente démarrage back-end..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 2; done'

      - name: Start front-end
        run: |
          npm start &
          timeout 60 bash -c 'until curl -sf http://localhost:4200; do sleep 2; done'

      - name: Run Cypress E2E
        run: npm run e2e
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8080
          CYPRESS_MAILHOG_URL: http://localhost:8025

      - name: Upload Cypress screenshots (si échec)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ github.sha }}
          path: cypress/screenshots/
          retention-days: 3

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ github.sha }}
          path: cypress/videos/
          retention-days: 3

  # ─────────────────────────────────────────
  # JOB 5 : Docker build image front (uniquement sur main)
  # ─────────────────────────────────────────
  docker:
    name: Build image Docker front
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/agora-front
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
