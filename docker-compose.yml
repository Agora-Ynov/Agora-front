services:

  agora-front:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agora-front
    ports:
      - "4200:80"
    depends_on:
      - agora-back
    networks:
      - agora-network
    restart: unless-stopped

  # ── Back-end (à adapter selon le repo agora-back) ──
  agora-back:
    image: ghcr.io/quentincavin/agora-back:latest   # remplacer par l'image réelle
    container_name: agora-back
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agora
      SPRING_DATASOURCE_USERNAME: agora
      SPRING_DATASOURCE_PASSWORD: agora
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-256-bits}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      FILE_UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - agora-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: agora-postgres
    environment:
      POSTGRES_DB: agora
      POSTGRES_USER: agora
      POSTGRES_PASSWORD: agora
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agora-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    container_name: agora-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web
    networks:
      - agora-network
    restart: unless-stopped

networks:
  agora-network:
    driver: bridge

volumes:
  postgres-data:
  uploads:
